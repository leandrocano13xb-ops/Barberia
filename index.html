<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barbería - Registro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body class="bg-custom">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-lg p-4 card-barber">
            <h3 class="text-center mb-4">
              <i class="fa fa-scissors"></i> Registrar Barbero
            </h3>

            <form id="formBarbero">
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa fa-user"></i></span>
                <input
                  type="text"
                  id="nombre"
                  class="form-control"
                  placeholder="Nombre completo"
                  required
                />
              </div>

              <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa fa-star"></i></span>
                <input
                  type="text"
                  id="especialidad"
                  class="form-control"
                  placeholder="Especialidad (Ej: Fade)"
                />
              </div>

              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="fa fa-phone"></i
                ></span>
                <input
                  type="text"
                  id="telefono"
                  class="form-control"
                  placeholder="Teléfono"
                />
              </div>

              <button type="submit" class="btn btn-gold w-100 fw-bold">
                <i class="fa fa-save"></i> GUARDAR BARBERO
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
