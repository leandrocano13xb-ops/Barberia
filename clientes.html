<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barbería - Registro de Clientes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body class="bg-custom">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-lg p-4 card-barber">
            <h3 class="text-center mb-4">
              <i class="fa fa-users"></i> Registrar Cliente
            </h3>

            <form id="formCliente">
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa fa-user"></i></span>
                <input
                  type="text"
                  id="nombre_cliente"
                  class="form-control"
                  placeholder="Nombre completo"
                  required
                />
              </div>

              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="fa fa-phone"></i
                ></span>
                <input
                  type="text"
                  id="telefono_cliente"
                  class="form-control"
                  placeholder="Teléfono / WhatsApp"
                />
              </div>

              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="fa fa-envelope"></i
                ></span>
                <input
                  type="email"
                  id="correo_cliente"
                  class="form-control"
                  placeholder="Correo electrónico"
                />
              </div>

              <button type="submit" class="btn btn-gold w-100 fw-bold">
                <i class="fa fa-save"></i> GUARDAR CLIENTE
              </button>

              <div class="text-center mt-3">
                <a
                  href="index.html"
                  class="text-warning small text-decoration-none"
                >
                  <i class="fa fa-arrow-left"></i> Volver a Barberos
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
