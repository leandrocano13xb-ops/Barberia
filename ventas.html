<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barbería - Registrar Venta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body class="bg-custom">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-lg p-4 card-barber">
            <h3 class="text-center mb-4">
              <i class="fa fa-shopping-cart"></i> Registro de Venta
            </h3>
            <form id="formVenta">
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa fa-user"></i></span>
                <input
                  type="number"
                  id="id_cliente_venta"
                  class="form-control"
                  placeholder="ID del Cliente"
                  required
                />
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa fa-cut"></i></span>
                <input
                  type="number"
                  id="id_servicio_venta"
                  class="form-control"
                  placeholder="ID del Servicio"
                  required
                />
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa fa-usd"></i></span>
                <input
                  type="number"
                  id="monto_venta"
                  class="form-control"
                  placeholder="Monto Total (COP)"
                  required
                />
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="fa fa-credit-card"></i
                ></span>
                <select id="metodo_pago" class="form-select">
                  <option value="Efectivo">Efectivo</option>
                  <option value="Transferencia">Transferencia</option>
                  <option value="Tarjeta">Tarjeta</option>
                </select>
              </div>

              <button type="submit" class="btn btn-gold w-100 fw-bold">
                <i class="fa fa-check-circle"></i> FINALIZAR VENTA
              </button>

              <div class="text-center mt-3">
                <a
                  href="menu.html"
                  class="text-warning small text-decoration-none"
                >
                  <i class="fa fa-home"></i> Menú Principal
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
